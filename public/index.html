<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Multi-LLM Debate Prototype</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        background: #050816;
        color: #e5e7eb;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .container {
        max-width: 960px;
        width: 100%;
        padding: 24px;
      }
      .card {
        background: radial-gradient(circle at top, #111827, #020617);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.8);
        padding: 24px 24px 32px;
      }
      h1 {
        font-size: 1.6rem;
        margin: 0 0 8px;
      }
      p.subtitle {
        margin: 0 0 20px;
        color: #9ca3af;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 4px;
      }
      textarea,
      input,
      select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #1f2933;
        background: #020617;
        color: #e5e7eb;
        font-size: 0.95rem;
        box-sizing: border-box;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      .field {
        margin-bottom: 14px;
      }
      button {
        background: linear-gradient(to right, #6366f1, #ec4899);
        color: white;
        border: none;
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        padding: 4px 8px;
        font-size: 0.75rem;
        color: #9ca3af;
        gap: 4px;
      }
      .pill-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #22c55e;
      }
      .results {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(55, 65, 81, 0.8);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.75rem;
        font-weight: 500;
      }
      .badge-consensus {
        background: rgba(22, 163, 74, 0.15);
        color: #bbf7d0;
      }
      .badge-nonconsensus {
        background: rgba(234, 179, 8, 0.1);
        color: #facc15;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 0.85rem;
      }
      th,
      td {
        border: 1px solid rgba(55, 65, 81, 0.8);
        padding: 6px 8px;
        text-align: left;
      }
      th {
        background: rgba(15, 23, 42, 0.9);
      }
      code {
        font-size: 0.8rem;
        background: rgba(15, 23, 42, 0.9);
        padding: 2px 4px;
        border-radius: 4px;
      }
      .error {
        color: #fca5a5;
        font-size: 0.85rem;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div style="display: flex; justify-content: space-between; gap: 8px">
          <div>
            <h1>Multi‑LLM Deliberation</h1>
            <p class="subtitle">
              Four models (ChatGPT, Claude, Gemini, Grok) debate your MCQ and
              seek consensus.
            </p>
          </div>
          <div class="pill">
            <span class="pill-dot"></span>
            Prototype
          </div>
        </div>

        <form id="debate-form">
          <div class="field">
            <label for="question">Question</label>
            <textarea
              id="question"
              name="question"
              placeholder="Enter your multiple-choice question..."
              required
            ></textarea>
          </div>

          <div class="row">
            <div class="field">
              <label for="optA">Option A</label>
              <input
                id="optA"
                name="optA"
                placeholder="e.g. 42"
                required
              />
            </div>
            <div class="field">
              <label for="optB">Option B</label>
              <input
                id="optB"
                name="optB"
                placeholder="e.g. 24"
                required
              />
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="optC">Option C (optional)</label>
              <input id="optC" name="optC" placeholder="Optional" />
            </div>
            <div class="field">
              <label for="optD">Option D (optional)</label>
              <input id="optD" name="optD" placeholder="Optional" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="maxRounds"
                >Max rounds
                <span style="color: #6b7280">(1–5, default 3)</span></label
              >
              <input
                id="maxRounds"
                name="maxRounds"
                type="number"
                min="1"
                max="5"
                placeholder="3"
              />
            </div>
            <div class="field">
              <label for="temperature"
                >Temperature
                <span style="color: #6b7280">(0–1, default 0.3)</span></label
              >
              <input
                id="temperature"
                name="temperature"
                type="number"
                min="0"
                max="1"
                step="0.1"
                placeholder="0.3"
              />
            </div>
          </div>

          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 4px;
            "
          >
            <button type="submit" id="submit-btn">
              <span>Run debate</span>
            </button>
            <span style="font-size: 0.8rem; color: #6b7280"
              >Calls: ChatGPT, Claude, Gemini, Grok per round</span
            >
          </div>
          <div id="form-error" class="error" style="display: none"></div>
        </form>

        <div id="results" class="results" style="display: none"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById('debate-form');
      const resultsEl = document.getElementById('results');
      const errorEl = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');

      function renderResult(data) {
        const labels = data.options.map(
          (_, idx) => String.fromCharCode('A'.charCodeAt(0) + idx),
        );
        const finalLabel = labels[data.finalChoice] || '?';
        const finalText = data.options[data.finalChoice] || '';

        const consensusBadge = data.consensus
          ? '<span class="badge badge-consensus">Consensus</span>'
          : '<span class="badge badge-nonconsensus">No full consensus (majority vote)</span>';

        const cost =
          data.totalEstimatedCostUsd != null
            ? `≈ $${data.totalEstimatedCostUsd.toFixed(4)}`
            : 'n/a';

        let roundsHtml = '';
        for (const round of data.rounds) {
          roundsHtml += `<h3 style="margin: 10px 0 4px; font-size: 0.95rem">Round ${round.round}</h3>`;
          roundsHtml += '<table><thead><tr><th>Model</th><th>Choice</th><th>Reasoning</th></tr></thead><tbody>';
          for (const resp of round.responses) {
            const label = labels[resp.choice] || '?';
            const opt = data.options[resp.choice] || '';
            roundsHtml += `<tr>
              <td>${resp.modelId}</td>
              <td><strong>${label}</strong> – ${opt}</td>
              <td>${resp.reasoning || '<em>n/a</em>'}</td>
            </tr>`;
          }
          roundsHtml += '</tbody></table>';
        }

        resultsEl.innerHTML = `
          <div style="display:flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;">
            <div>
              <div style="font-size: 0.85rem; color:#9ca3af; margin-bottom:4px;">Final answer</div>
              <div style="font-size: 1.05rem;">
                <strong>${finalLabel}.</strong> ${finalText}
              </div>
            </div>
            <div style="text-align:right; font-size:0.8rem; color:#9ca3af;">
              <div>${consensusBadge}</div>
              <div style="margin-top:4px;">Rounds: ${data.rounds.length} • Est. cost: ${cost}</div>
            </div>
          </div>
          <div style="margin-top: 10px; text-align: right;">
            <a href="/api/session/${encodeURIComponent(data.sessionId)}/report.pdf" style="display:inline-block; padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.5); color: #e5e7eb; text-decoration: none; font-size: 0.9rem;">
              Download PDF report
            </a>
          </div>
          <div style="margin-top: 12px;">
            <details open>
              <summary style="cursor:pointer; font-size:0.9rem; color:#9ca3af;">View per‑round reasoning</summary>
              <div style="margin-top: 8px;">
                ${roundsHtml}
              </div>
            </details>
          </div>
        `;

        resultsEl.style.display = 'block';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.style.display = 'none';
        resultsEl.style.display = 'none';
        resultsEl.innerHTML = '';

        const question = document.getElementById('question').value.trim();
        const optA = document.getElementById('optA').value.trim();
        const optB = document.getElementById('optB').value.trim();
        const optC = document.getElementById('optC').value.trim();
        const optD = document.getElementById('optD').value.trim();
        const maxRoundsVal = document
          .getElementById('maxRounds')
          .value.trim();
        const temperatureVal = document
          .getElementById('temperature')
          .value.trim();

        if (!question || !optA || !optB) {
          errorEl.textContent =
            'Question, Option A, and Option B are required.';
          errorEl.style.display = 'block';
          return;
        }

        const options = [optA, optB];
        if (optC) options.push(optC);
        if (optD) options.push(optD);

        const payload = {
          question,
          options,
        };

        if (maxRoundsVal) {
          payload.maxRounds = Number(maxRoundsVal);
        }
        if (temperatureVal) {
          payload.temperature = Number(temperatureVal);
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Running...';

        try {
          const res = await fetch('/api/debate', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const errText = await res.text();
            throw new Error(
              `Request failed (${res.status}): ${errText || 'Unknown error'}`,
            );
          }
          const data = await res.json();
          renderResult(data);
        } catch (err) {
          errorEl.textContent = String(err.message || err);
          errorEl.style.display = 'block';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Run debate';
        }
      });
    </script>
  </body>
  </html>
